# Global pre-commit configuration.
# Invoked by hooks/pre-commit via: pre-commit run --config <this-file>
# Runs on staged files only (equivalent to VALIDATE_ALL_CODEBASE: false).
#
# Every hook below uses `language: system` and calls a binary already on PATH.
# This is intentional: pre-commit's default `language: python` / `language: node`
# would clone every hook repo and build a per-environment venv on first run
# (1-3 minutes per fresh container, ~150 MB on disk). On a developer workstation
# that's a one-off cost; on ephemeral containers (Docker / CI / NanoClaw agent
# spawns) we'd pay it on every spawn.
#
# Going `language: system` shifts the responsibility for installing the tools
# from pre-commit to the host (or the container image). install.sh below lists
# what each hook needs.
#
# VALIDATE_SQLFLUFF and VALIDATE_CLOUDFORMATION are handled by dedicated
# checks in hooks/pre-commit and are not duplicated here.

default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: local
    hooks:
      # ── pre-commit-hooks (pip install pre-commit-hooks) ────────────────────
      # General quality + JSON/XML/YAML/TOML syntax. Each hook below maps to
      # a console_script bin shipped by the upstream `pre-commit-hooks` package.
      - id: check-merge-conflict
        name: check for merge conflicts
        entry: check-merge-conflict
        language: system
        types: [text]

      - id: check-case-conflict
        name: check for case conflicts
        entry: check-case-conflict
        language: system

      - id: check-added-large-files
        name: check for added large files
        entry: check-added-large-files
        language: system

      - id: end-of-file-fixer
        name: fix end of files
        entry: end-of-file-fixer
        language: system
        types: [text]

      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [text]

      - id: mixed-line-ending
        name: mixed line ending
        entry: mixed-line-ending
        language: system
        types: [text]

      - id: check-toml
        name: check toml
        entry: check-toml
        language: system
        types: [toml]

      - id: detect-private-key
        name: detect private key
        entry: detect-private-key
        language: system
        types: [text]

      - id: check-executables-have-shebangs
        name: check that executables have shebangs
        entry: check-executables-have-shebangs
        language: system
        types: [text, executable]

      - id: check-shebang-scripts-are-executable
        name: check that scripts with shebangs are executable
        entry: check-shebang-scripts-are-executable
        language: system
        types: [text]

      - id: check-json
        name: check json
        entry: check-json
        language: system
        types: [json]

      - id: check-xml
        name: check xml
        entry: check-xml
        language: system
        types: [xml]

      - id: check-yaml
        name: check yaml
        entry: check-yaml
        language: system
        types: [yaml]
        args: [--allow-multiple-documents]

      # ── VALIDATE_BASH ──────────────────────────────────────────────────────
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]

      # ── VALIDATE_YAML — full style lint ───────────────────────────────────
      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        types: [yaml]

      # ── VALIDATE_PYTHON — flake8 ──────────────────────────────────────────
      - id: flake8
        name: flake8
        entry: flake8
        language: system
        types: [python]
        require_serial: true

      # ── VALIDATE_MD — markdownlint ────────────────────────────────────────
      - id: markdownlint
        name: markdownlint
        entry: markdownlint
        language: system
        types: [markdown]

      # ── VALIDATE_ANSIBLE — ansible-lint ───────────────────────────────────
      # Mirrors the upstream ansible-lint hook config: don't pass filenames
      # (it scans the project itself), always run.
      - id: ansible-lint
        name: ansible-lint
        entry: ansible-lint -v --force-color
        language: system
        pass_filenames: false
        always_run: true

      # ── VALIDATE_DOCKERFILE / VALIDATE_DOCKERFILE_HADOLINT ────────────────
      - id: hadolint
        name: hadolint
        entry: hadolint
        language: system
        files: (^|/)Dockerfile[^/]*$

      # ── VALIDATE_GITHUB_ACTIONS ───────────────────────────────────────────
      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        files: ^\.github/(workflows|actions)/.*\.(yml|yaml)$

      # ── VALIDATE_PYTHON_PYLINT ────────────────────────────────────────────
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]

      # ── VALIDATE_CSS — wrapper skips silently if no package.json ─────────
      - id: stylelint
        name: stylelint
        entry: run-stylelint
        language: system
        files: \.css$

      # ── VALIDATE_ENV ──────────────────────────────────────────────────────
      - id: dotenv-linter
        name: dotenv-linter
        entry: dotenv-linter
        language: system
        files: (^|/)\.env(\.[^/]+)?$

      # ── VALIDATE_TYPESCRIPT_ES — wrapper skips silently if no eslint cfg ─
      - id: eslint
        name: eslint
        entry: run-eslint
        language: system
        files: \.(ts|tsx|js|jsx)$

      # ── VALIDATE_XML — full xmllint validation (supplements check-xml) ────
      - id: xmllint
        name: xmllint
        entry: xmllint
        args: [--noout]
        language: system
        types: [xml]

      # ── VALIDATE_POWERSHELL ───────────────────────────────────────────────
      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        entry: run-psscriptanalyzer
        language: system
        files: \.(ps1|psm1|psd1)$
