--- # Checkout, install deps + hooks, run acceptance tests, always clean up global hooks
name: "Acceptance Tests"
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  acceptance-test:
    runs-on: ubuntu-latest
    steps:
      - name: "Initialise Workspace"
        if: runner.environment == 'self-hosted'
        shell: bash
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: "Set Active Environment"
        shell: bash
        run: |
          {
            echo "ACTIVE_RUNNER_NAME=${{runner.name}}"
            echo "ACTIVE_HOSTNAME=$HOSTNAME"
            echo "ACTIVE_USER=$USER"
          } >> "$GITHUB_ENV"

      - name: "Checkout Source"
        uses: actions/checkout@v7.0.0
        with:
          clean: true
          fetch-depth: 1

      - name: "Setup Go"
        uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.25"

      - name: "Install"
        shell: bash
        # check-setup (run last by install) exits non-zero when an optional tool
        # is missing on the runner; the hooks are still installed, so don't fail
        # the step on it — the acceptance tests below are the real gate.
        run: ./install || true

      - name: "Run Acceptance Tests"
        shell: bash
        run: ./acceptance-test

      - name: "Remove global pre-commit hooks"
        if: always()
        shell: bash
        run: git config --global --unset core.hooksPath || true
